<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }.header {
  padding: 15px;
  text-align: center;
  background: #020617;
  font-weight: bold;
  font-size: 18px;
  border-bottom: 1px solid #1e293b;
}

.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.message {
  max-width: 70%;
  padding: 10px 15px;
  border-radius: 15px;
  margin-bottom: 10px;
  line-height: 1.4;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #1e293b;
  margin-right: auto;
}

.input-area {
  display: flex;
  padding: 10px;
  background: #020617;
  border-top: 1px solid #1e293b;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1e293b;
  color: white;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

  </style>
</head>
<body>  <div class="header">🤖 AI Chatbot</div>  <div class="chat-container" id="chat"></div>  <div class="input-area">
    <input type="text" id="input" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>  <script>
    const API_KEY = "dori_live_mlkp0987juhi654";
    const API_URL = "https://proxy.doritechnology88.workers.dev/?q=";

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = "message " + sender;
      div.innerText = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      try {
        const response = await fetch(API_URL + encodeURIComponent(text) + "&key=" + API_KEY);
        const data = await response.json();

        // Handle multiple possible response formats
        let reply = "";

        if (data.reply) {
          reply = data.reply;
        } else if (data.answer) {
          reply = data.answer;
        } else if (data.message) {
          reply = data.message;
        } else {
          reply = JSON.stringify(data);
        }

        // Ensure Marathi or any Unicode text displays properly
        reply = decodeURIComponent(escape(reply));
        addMessage(reply, "bot");

      } catch (error) {
        addMessage("Error: " + error.message, "bot");
      }
    }

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") sendMessage();
    });
  </script></body>
</html>
